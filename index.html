<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex App Pro</title>
    <style>
        :root {
            --bg-dark: #121212;
            --surface-dark: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        /* Card Style */
        .card {
            background-color: var(--surface-dark);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        h2, h3 { text-align: center; margin-top: 0; color: var(--primary); }
        
        /* Inputs & Buttons */
        input, select {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            margin-bottom: 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #2c2c2c;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #9965f4; }
        .btn-outline {
            background-color: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            margin-top: 10px;
        }
        
        /* Sections */
        #app-section, #form-section { display: none; }
        
        /* Dashboard Grid */
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .dash-card {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--secondary);
        }
        .dash-title { font-size: 14px; color: var(--text-muted); }
        .dash-value { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .positive { color: var(--secondary); }
        .negative { color: var(--error); }
        
        .loading { text-align: center; color: var(--text-muted); display: none; }
    </style>
</head>
<body>

<div class="container">

    <div id="login-section" class="card">
        <h2>🔒 Login</h2>
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
        <p id="login-error" style="color: var(--error); text-align: center; display: none;">รหัสผ่านไม่ถูกต้อง!</p>
    </div>

    <div id="app-section">
        <div class="card">
            <h2>📊 Dashboard</h2>
            <div id="dash-loading" class="loading" style="display: block;">⏳ กำลังโหลดข้อมูล...</div>
            <div id="dash-content" class="dash-grid">
                </div>
            <button onclick="showForm()" style="margin-top: 20px;">+ เพิ่มรายการใหม่</button>
            <button onclick="loadDashboard()" class="btn-outline">🔄 รีเฟรชข้อมูล</button>
        </div>
    </div>

    <div id="form-section" class="card">
        <h3>บันทึก ฝาก/ถอน</h3>
        <form id="forexForm">
            <label>สกุลเงิน</label>
            <select id="currency">
                <option value="USD">USD</option>
                <option value="GBP">GBP</option>
                <option value="EUR">EUR</option>
            </select>

            <label>ประเภท</label>
            <select id="type">
                <option value="Deposit">ฝาก (Deposit)</option>
                <option value="Withdraw">ถอน (Withdraw)</option>
            </select>

            <label>จำนวนเงินต่างประเทศ</label>
            <input type="number" id="amountForeign" step="0.01" required>

            <label>จำนวนเงินบาท (THB)</label>
            <input type="number" id="amountTHB" step="0.01" required>

            <label>หมายเหตุ</label>
            <input type="text" id="note" placeholder="เช่น Exness, ถอนกำไร...">

            <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
            <button type="button" class="btn-outline" onclick="showDashboard()">ยกเลิกกลับไปหน้าแรก</button>
            <div id="form-loading" class="loading" style="margin-top: 15px;">⏳ กำลังบันทึกข้อมูล...</div>
        </form>
    </div>

</div>

<script>
    // ** เปลี่ยน URL ตรงนี้เป็น URL ใหม่ที่ได้จากการ Deploy GAS ล่าสุด **
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDtIhfDFcfgvwdG2OvbUjJ9hYq3mH8795ZSW31x4SJs_F01-wZzyxMj3iUf6J6Gso/exec';

    // --- Navigation Functions ---
    function checkLogin() {
        const pass = document.getElementById('password').value;
        if (pass === 'spectre') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            loadDashboard(); // โหลดข้อมูลทันทีที่ล็อคอินผ่าน
        } else {
            document.getElementById('login-error').style.display = 'block';
        }
    }

    function showForm() {
        document.getElementById('app-section').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
    }

    function showDashboard() {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        loadDashboard();
    }

    // --- Load Dashboard Data ---
    function loadDashboard() {
        document.getElementById('dash-loading').style.display = 'block';
        document.getElementById('dash-content').innerHTML = '';

        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    renderDashboard(data.data);
                }
            })
            .catch(err => console.error(err))
            .finally(() => {
                document.getElementById('dash-loading').style.display = 'none';
            });
    }

    function renderDashboard(data) {
        const container = document.getElementById('dash-content');
        let html = '';
        
        ['USD', 'GBP', 'EUR'].forEach(curr => {
            let net = data[curr].net;
            let netClass = net >= 0 ? 'positive' : 'negative';
            let sign = net >= 0 ? '+' : '';
            
            html += `
            <div class="dash-card">
                <div class="dash-title">Net Balance (${curr})</div>
                <div class="dash-value ${netClass}">${sign}${net.toFixed(2)}</div>
                <div style="font-size: 12px; color: #888; margin-top: 5px;">
                    Deposit: ${data[curr].deposit.toFixed(2)} | Withdraw: ${data[curr].withdraw.toFixed(2)}
                </div>
            </div>
            `;
        });
        
        container.innerHTML = html;
    }

    // --- Submit Form Data ---
    document.getElementById('forexForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('form-loading');
        btn.style.display = 'none';
        loading.style.display = 'block';

        const payload = {
            currency: document.getElementById('currency').value,
            type: document.getElementById('type').value,
            amountForeign: document.getElementById('amountForeign').value,
            amountTHB: document.getElementById('amountTHB').value,
            note: document.getElementById('note').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('✅ บันทึกข้อมูลเรียบร้อย!');
            document.getElementById('forexForm').reset();
            showDashboard(); // กลับไปหน้าแดชบอร์ด
        })
        .catch(err => alert('❌ Error: ' + err))
        .finally(() => {
            btn.style.display = 'block';
            loading.style.display = 'none';
        });
    });
</script>

</body>
</html>
