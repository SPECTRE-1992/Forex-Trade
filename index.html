<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Deposit/Withdraw Tracker</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-top: 15px; color: #555; }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--success-color); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            margin-top: 25px;
            transition: background 0.3s;
        }
        button:hover { background-color: #219150; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #loading { display: none; text-align: center; margin-top: 15px; color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>บันทึกข้อมูล Forex</h2>
    <form id="forexForm">
        <div class="grid">
            <div>
                <label for="currency">สกุลเงิน:</label>
                <select id="currency">
                    <option value="USD">USD</option>
                    <option value="GBP">GBP</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
            <div>
                <label for="type">รายการ:</label>
                <select id="type">
                    <option value="Deposit">ฝาก (Deposit)</option>
                    <option value="Withdraw">ถอน (Withdraw)</option>
                </select>
            </div>
        </div>

        <label for="amountForeign">จำนวนเงินต่างประเทศ:</label>
        <input type="number" id="amountForeign" step="0.01" placeholder="ยอดเงินสกุลที่เลือก" required>

        <label for="amountTHB">จำนวนเงินบาท (THB):</label>
        <input type="number" id="amountTHB" step="0.01" placeholder="ยอดเงินที่ตัดหรือรับจริง" required>

        <label for="note">บันทึกช่วยจำ:</label>
        <input type="text" id="note" placeholder="เช่น Exness, โบนัส 30%...">

        <button type="submit" id="submitBtn">บันทึกลง Google Sheet</button>
        <div id="loading">⏳ กำลังบันทึกข้อมูล...</div>
    </form>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDtIhfDFcfgvwdG2OvbUjJ9hYq3mH8795ZSW31x4SJs_F01-wZzyxMj3iUf6J6Gso/exec';

    document.getElementById('forexForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        
        btn.disabled = true;
        loading.style.display = 'block';

        const payload = {
            currency: document.getElementById('currency').value,
            type: document.getElementById('type').value,
            amountForeign: document.getElementById('amountForeign').value,
            amountTHB: document.getElementById('amountTHB').value,
            note: document.getElementById('note').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // สำคัญ: ใช้สำหรับการส่งจาก Github ไปยัง GAS
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert('✅ บันทึกข้อมูลสำเร็จ!');
            document.getElementById('forexForm').reset();
        })
        .catch(err => {
            alert('❌ เกิดข้อผิดพลาด: ' + err.message);
        })
        .finally(() => {
            btn.disabled = false;
            loading.style.display = 'none';
        });
    });
</script>

</body>
</html>
