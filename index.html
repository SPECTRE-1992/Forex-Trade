<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forex App Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --surface-dark: #1e293b;
            --surface-hover: #334155;
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.4);
            --secondary: #34d399;
            --error: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 90px;
        }

        /* --- Login Section --- */
        #login-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background-color: var(--surface-dark);
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            text-align: center;
        }

        h2 { font-weight: 600; margin-top: 0; margin-bottom: 25px; }
        .text-primary { color: var(--primary); }

        /* --- Forms & Inputs --- */
        input, select {
            width: 100%;
            padding: 12px 14px;
            margin-top: 6px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        label { font-size: 14px; color: var(--text-muted); font-weight: 500; margin-left: 4px; }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        button:active { transform: scale(0.98); }
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            box-shadow: none;
            margin-top: 15px;
        }
        .btn-outline:active { background-color: var(--surface-hover); }

        /* --- Dashboard --- */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-top: 10px;
        }
        .app-header h2 { margin: 0; font-size: 22px; color: #fff;}

        .logout-btn {
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
            width: auto;
            padding: 6px 12px;
            font-size: 13px;
            margin: 0;
            border-radius: 8px;
            box-shadow: none;
        }

        /* Filter */
        .filter-box {
            background: var(--surface-dark);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }
        .filter-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; }
        .date-range-row { display: flex; gap: 8px; align-items: center; }
        .date-range-row input { margin: 0; flex: 1; padding: 10px; font-size: 14px; }
        .date-range-row span { color: var(--text-muted); font-size: 13px; }
        .date-range-row button { margin: 0; width: auto; padding: 10px 14px; font-size: 13px; }

        /* Summary Grid */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .dash-card {
            background: linear-gradient(145deg, var(--surface-dark), var(--bg-dark));
            padding: 14px 8px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .dash-title { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .dash-value { font-size: 16px; font-weight: 600; }

        /* Transaction List */
        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 12px; 
        }
        .section-title { font-size: 16px; font-weight: 600; color: var(--text-muted); margin: 0; }
        .limit-select { width: auto; padding: 4px 8px; margin: 0; font-size: 13px; border-radius: 6px; background-color: var(--surface-dark); border-color: var(--border); }

        .list-container { display: flex; flex-direction: column; gap: 10px; }
        
        .list-item { 
            background: var(--surface-dark);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }
        
        .item-icon-wrapper {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; margin-right: 12px; flex-shrink: 0;
        }
        .deposit .item-icon-wrapper { background: rgba(52, 211, 153, 0.15); color: var(--secondary); }
        .withdraw .item-icon-wrapper { background: rgba(248, 113, 113, 0.15); color: var(--error); }

        .item-left { display: flex; align-items: center; flex: 1; overflow: hidden; }
        .item-main { display: flex; flex-direction: column; }
        .item-title { font-weight: 600; font-size: 14px; }
        .item-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .item-note { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        
        .item-amount { text-align: right; flex-shrink: 0; }
        .val-foreign { font-weight: 600; font-size: 15px; }
        .val-thb { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .positive { color: var(--secondary); }
        .negative { color: var(--error); }
        
        .loading { text-align: center; color: var(--primary); display: none; padding: 20px; font-weight: 500; font-size: 14px; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(129,140,248,0.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--primary);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            box-shadow: 0 8px 20px var(--primary-glow);
            cursor: pointer;
            border: none;
            z-index: 1000;
            margin: 0; padding: 0;
        }

        .form-header { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .back-btn { background: var(--surface-dark); width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; color: #fff; text-decoration: none; font-size: 18px; margin: 0; padding: 0; box-shadow: none; }
        .form-header h2 { margin: 0; font-size: 20px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-section">
    <div class="login-card">
        <h2 class="text-primary">Forex App Pro</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">กรุณาใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
        <input type="password" id="password" placeholder="รหัสผ่าน (กด Enter)" onkeypress="handleLoginKey(event)" style="text-align: center;">
        <button onclick="checkLogin()">เข้าสู่ระบบ</button>
        <p id="login-error" class="hidden" style="color: var(--error); font-size: 14px; margin-top: 15px;">รหัสผ่านไม่ถูกต้อง!</p>
    </div>
</div>

<div class="container hidden" id="main-container">
    <div id="app-section">
        <div class="app-header">
            <div>
                <div style="font-size: 13px; color: var(--text-muted);">ยินดีต้อนรับ 👋</div>
                <h2>ภาพรวมพอร์ตโฟลิโอ</h2>
            </div>
            <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
        </div>
        
        <div class="filter-box">
            <label class="filter-label">ระบุช่วงเวลา (Start Date - End Date)</label>
            <div class="date-range-row">
                <input type="date" id="startDate" onchange="filterData()">
                <span>ถึง</span>
                <input type="date" id="endDate" onchange="filterData()">
                <button class="btn-outline" onclick="clearFilter()">รีเซ็ต</button>
            </div>
        </div>

        <div class="dash-grid" id="summary-cards">
            </div>

        <div class="section-header">
            <h3 class="section-title">ประวัติรายการ</h3>
            <select id="limitRows" class="limit-select" onchange="filterData()">
                <option value="30">แสดง 30 รายการ</option>
                <option value="50">แสดง 50 รายการ</option>
                <option value="100">แสดง 100 รายการ</option>
                <option value="all">แสดงทั้งหมด</option>
            </select>
        </div>

        <div id="dash-loading" class="loading"><div class="spinner"></div> กำลังโหลดข้อมูล...</div>
        
        <div class="list-container" id="transaction-list"></div>

        <button class="fab" onclick="showForm()">+</button>
    </div>

    <div id="form-section" class="hidden">
        <div class="form-header">
            <button class="back-btn" onclick="showDashboard()">←</button>
            <h2>บันทึก ฝาก/ถอน</h2>
        </div>
        <form id="forexForm">
            <label>สกุลเงิน</label>
            <select id="currency">
                <option value="GBP">GBP</option>
                <option value="EUR">EUR</option>
                <option value="USD">USD</option>
            </select>

            <label>ประเภท</label>
            <select id="type">
                <option value="Deposit">ฝาก (Deposit)</option>
                <option value="Withdraw">ถอน (Withdraw)</option>
            </select>

            <label>จำนวนเงินต่างประเทศ (Foreign Amount)</label>
            <input type="number" id="amountForeign" step="0.01" placeholder="0.00" required>

            <label>อัตราแลกเปลี่ยน (Exchange Rate)</label>
            <input type="number" id="rate" step="0.0001" placeholder="เช่น 45.50" required>

            <label>จำนวนเงินบาท (THB) <span style="color:var(--secondary);">(คำนวณอัตโนมัติ)</span></label>
            <input type="number" id="amountTHB" step="0.01" placeholder="0.00" required>

            <label>หมายเหตุ</label>
            <input type="text" id="note" placeholder="เช่น Exness, ถอนกำไร...">

            <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
            <div id="form-loading" class="loading" style="margin-top: 15px;"><div class="spinner"></div> กำลังบันทึกข้อมูล...</div>
        </form>
    </div>
</div>

<script>
    // 🚨🚨🚨 ใส่ URL Web App ของคุณ 🚨🚨🚨
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwDtIhfDFcfgvwdG2OvbUjJ9hYq3mH8795ZSW31x4SJs_F01-wZzyxMj3iUf6J6Gso/exec';

    let allData = [];
    const SESSION_DAYS = 5;

    // --- On Load Check Session ---
    window.onload = function() {
        checkSession();
    };

    function checkSession() {
        const loginTime = localStorage.getItem('forexLoginTimestamp');
        if (loginTime) {
            const now = new Date().getTime();
            const diffDays = (now - parseInt(loginTime)) / (1000 * 3600 * 24);
            if (diffDays <= SESSION_DAYS) {
                showMainApp();
                return;
            } else {
                localStorage.removeItem('forexLoginTimestamp');
            }
        }
        document.getElementById('login-section').style.display = 'flex';
    }

    function handleLoginKey(e) { if(e.key === 'Enter') checkLogin(); }
    
    function checkLogin() {
        const pass = document.getElementById('password').value;
        if (pass === 'spectre') {
            localStorage.setItem('forexLoginTimestamp', new Date().getTime().toString());
            showMainApp();
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    }

    function logout() {
        localStorage.removeItem('forexLoginTimestamp');
        location.reload(); 
    }

    function showMainApp() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('main-container').classList.remove('hidden');
        loadData();
    }

    // --- Navigation ---
    function showForm() {
        document.getElementById('app-section').classList.add('hidden');
        document.getElementById('form-section').classList.remove('hidden');
        window.scrollTo(0, 0);
    }
    function showDashboard() {
        document.getElementById('form-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        window.scrollTo(0, 0);
    }

    // --- Auto Calculate THB ---
    const amtF = document.getElementById('amountForeign');
    const inputRate = document.getElementById('rate');
    const amtTHB = document.getElementById('amountTHB');

    function calculate() {
        if(amtF.value && inputRate.value) {
            amtTHB.value = (parseFloat(amtF.value) * parseFloat(inputRate.value)).toFixed(2);
        }
    }
    amtF.addEventListener('input', calculate);
    inputRate.addEventListener('input', calculate);

    // --- Load Data ---
    function loadData() {
        document.getElementById('dash-loading').style.display = 'block';
        document.getElementById('transaction-list').innerHTML = '';
        
        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    allData = res.data;
                    filterData(); // โหลดเสร็จสั่งให้ประมวลผลวาดการ์ดและรายการทันที
                }
            })
            .catch(err => console.error(err))
            .finally(() => document.getElementById('dash-loading').style.display = 'none');
    }

    // --- Filters System ---
    function clearFilter() {
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        filterData();
    }

    function filterData() {
        const startDateStr = document.getElementById('startDate').value;
        const endDateStr = document.getElementById('endDate').value;
        const limit = document.getElementById('limitRows').value;
        
        let filtered = allData;

        // กรองตามช่วงเวลาที่ระบุ (ถ้ามี)
        if(startDateStr || endDateStr) {
            filtered = allData.filter(item => {
                if(!item.date) return false;
                
                // แปลงเวลาของ item ให้อยู่ที่ 00:00:00 ของวันนั้น เพื่อเปรียบเทียบง่ายขึ้น
                const d = new Date(item.date);
                d.setHours(0,0,0,0);
                const itemTime = d.getTime();

                let passStart = true;
                let passEnd = true;

                if (startDateStr) {
                    const startD = new Date(startDateStr);
                    startD.setHours(0,0,0,0);
                    passStart = itemTime >= startD.getTime();
                }
                
                if (endDateStr) {
                    const endD = new Date(endDateStr);
                    endD.setHours(23,59,59,999); // ให้อยู่จนถึงสิ้นวันของวันที่เลือก
                    passEnd = d.getTime() <= endD.getTime();
                }

                return passStart && passEnd;
            });
        }
        
        // คำนวณสรุปยอดจากการกรอง
        renderSummary(filtered);

        // ตัดจำนวนรายการที่แสดง
        let displayData = filtered;
        if(limit !== 'all') {
            displayData = filtered.slice(0, parseInt(limit));
        }

        renderList(displayData);
    }

    function renderSummary(data) {
        let sums = { "GBP": { net: 0 }, "EUR": { net: 0 }, "USD": { net: 0 } };
        
        data.forEach(item => {
            const currency = item.currency ? item.currency.trim().toUpperCase() : '';
            const amt = parseFloat(item.amountForeign) || 0;
            if(sums[currency]) {
                if(item.type === "Deposit") sums[currency].net += amt;
                if(item.type === "Withdraw") sums[currency].net -= amt;
            }
        });

        let html = '';
        ['GBP', 'EUR', 'USD'].forEach(curr => {
            let net = sums[curr].net;
            let cssClass = net >= 0 ? 'positive' : 'negative';
            let sign = net > 0 ? '+' : '';
            html += `
                <div class="dash-card">
                    <div class="dash-title">${curr}</div>
                    <div class="dash-value ${cssClass}">${sign}${net.toFixed(2)}</div>
                </div>
            `;
        });
        document.getElementById('summary-cards').innerHTML = html;
    }

    function renderList(data) {
        let html = '';
        if(data.length === 0) {
            html = '<div style="text-align:center; color:var(--text-muted); padding:30px; background:var(--surface-dark); border-radius:14px;">ไม่พบรายการในช่วงเวลาที่เลือก</div>';
        }

        data.forEach(item => {
            let d = new Date(item.date);
            let dateStr = d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' }) + ' ' + d.toLocaleTimeString('th-TH',{hour:'2-digit', minute:'2-digit'});
            
            let isDep = item.type === 'Deposit';
            let mainClass = isDep ? 'deposit' : 'withdraw';
            let textClass = isDep ? 'positive' : 'negative';
            let sign = isDep ? '+' : '-';
            let icon = isDep ? '↓' : '↑';
            let typeTh = isDep ? 'ฝาก' : 'ถอน';
            
            html += `
            <div class="list-item ${mainClass}">
                <div class="item-left">
                    <div class="item-icon-wrapper">${icon}</div>
                    <div class="item-main">
                        <div class="item-title">${typeTh} ${item.currency}</div>
                        <div class="item-date">${dateStr}</div>
                        ${item.note ? `<div class="item-note">📝 ${item.note}</div>` : ''}
                    </div>
                </div>
                <div class="item-amount">
                    <div class="val-foreign ${textClass}">${sign}${parseFloat(item.amountForeign).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                    <div class="val-thb">฿${parseFloat(item.amountTHB).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                </div>
            </div>`;
        });
        document.getElementById('transaction-list').innerHTML = html;
    }

    // --- Submit Form Data ---
    document.getElementById('forexForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('form-loading');
        btn.style.display = 'none';
        loading.style.display = 'block';

        const payload = {
            currency: document.getElementById('currency').value,
            type: document.getElementById('type').value,
            amountForeign: document.getElementById('amountForeign').value,
            rate: document.getElementById('rate').value,
            amountTHB: document.getElementById('amountTHB').value,
            note: document.getElementById('note').value
        };

        fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success'){
                // รีเซ็ตค่าในฟอร์มให้สะอาดทั้งหมดเมื่อบันทึกเสร็จ
                document.getElementById('forexForm').reset();
                document.getElementById('amountTHB').value = ''; 
                
                showDashboard();
                loadData();
            } else {
                alert('❌ เกิดข้อผิดพลาด: ' + data.message);
            }
        })
        .catch(err => alert('❌ Error: ' + err))
        .finally(() => {
            btn.style.display = 'block';
            loading.style.display = 'none';
        });
    });
</script>

</body>
</html>
